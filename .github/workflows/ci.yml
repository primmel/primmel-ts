name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Type-check
        run: yarn compile
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn test
      - name: Build package
        run: yarn build
